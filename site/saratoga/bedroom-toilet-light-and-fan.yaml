substitutions:
  name: bedroom-toilet-light-and-fan
  friendly_name: "Primary Bedroom Toilet Switch"
  ip_address: 10.10.10.26
  timeout: 5 minutes

packages:
  mfa-06: !include "../../models/esp8266/mfa-06.yaml"
  static_ip: !include "../../common/static_ip.yaml"
  sw0_is_a_light: !include "../../common/sw0_is_a_light.yaml"
  sw1_is_a_fan: !include "../../common/sw1_is_a_fan.yaml"

light:
  - id: !extend sw0_light
    name: Primary Bedroom Toilet Light

fan:
  - id: !extend sw1_fan
    name: Primary Bedroom Toilet Fan
